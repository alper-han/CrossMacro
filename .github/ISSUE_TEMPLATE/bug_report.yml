name: Bug Report
description: Report a reproducible CrossMacro problem
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please include the install
        channel, platform/session details, reproduction steps, logs, and doctor
        output whenever possible.

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Which platform are you using?
      options:
        - Linux X11
        - Linux Wayland - GNOME
        - Linux Wayland - KDE Plasma
        - Linux Wayland - Hyprland
        - Linux Wayland - Wayfire
        - Linux Wayland - Niri
        - Linux Wayland - COSMIC
        - Linux Wayland - Other
        - Windows
        - macOS
    validations:
      required: true

  - type: dropdown
    id: install_method
    attributes:
      label: Install Method
      description: How did you install CrossMacro?
      options:
        - Flatpak (Flathub)
        - AppImage
        - .deb (Debian/Ubuntu)
        - .rpm (Fedora/RHEL)
        - AUR
        - Nix / NixOS
        - Microsoft Store
        - winget
        - MSIX
        - Portable EXE
        - DMG
        - Built from source
        - Other
    validations:
      required: true

  - type: input
    id: os_version
    attributes:
      label: OS Version
      description: Distribution or OS release.
      placeholder: Arch Linux / Ubuntu 24.04 / Fedora 40 / NixOS / Windows 11 / macOS 15
    validations:
      required: true

  - type: input
    id: desktop_session
    attributes:
      label: Desktop/session details
      description: Add compositor, desktop environment, session type, or relevant session state.
      placeholder: GNOME 50 Wayland / KDE Plasma 6 Wayland / Hyprland / X11 / locked Windows session

  - type: input
    id: app_version
    attributes:
      label: CrossMacro Version
      description: App version shown in About or `crossmacro --version`
      placeholder: 1.2.0
    validations:
      required: true

  - type: dropdown
    id: affected_area
    attributes:
      label: Affected area
      description: Which part of CrossMacro is affected?
      multiple: true
      options:
        - Recording
        - Playback
        - Macro editor / files
        - Shortcuts / global hotkeys
        - Scheduled tasks
        - Text expansion
        - CLI / GUI-less desktop runtime
        - Doctor / diagnostics
        - Linux daemon / direct device setup
        - Install / update / packaging
        - Other

  - type: dropdown
    id: linux_mode
    attributes:
      label: Linux Mode (if applicable)
      description: If you're on Linux, which mode are you using?
      options:
        - Native X11 backend
        - Daemon-backed mode (socket at /run/crossmacro/crossmacro.sock)
        - Direct device mode
        - Not sure / Not Linux

  - type: dropdown
    id: setup_flow
    attributes:
      label: Setup or permission flow (if applicable)
      description: Did a setup, permission, or diagnostics flow appear before the problem?
      multiple: true
      options:
        - Linux Quick Setup
        - Linux daemon setup
        - macOS Input Monitoring
        - macOS Accessibility
        - Doctor reported warnings or failures
        - Not applicable / not sure

  - type: textarea
    id: description
    attributes:
      label: Describe the Bug
      description: A clear and concise description of what the bug is.
      placeholder: When I press F8 to record...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true

  - type: textarea
    id: doctor
    attributes:
      label: Doctor output
      description: Paste `crossmacro doctor --json --verbose` output. On macOS DMG installs, use `/Applications/CrossMacro.app/Contents/MacOS/CrossMacro.UI doctor --json --verbose` if `crossmacro` is not on PATH.
      render: shell

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Please copy and paste relevant app, terminal, daemon, packaging, or system logs. For Linux daemon installs, `journalctl -u crossmacro.service -f` is often useful.
      render: shell

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Add screenshots, workarounds tried, or anything else that may help.
