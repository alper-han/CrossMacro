name: 🐞 Bug Report
description: Create a report to help us improve CrossMacro
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Which platform are you using?
      options:
        - Linux (X11)
        - Hyprland (Wayland)
        - KDE Plasma (Wayland)
        - GNOME (Wayland)
        - Other Wayland
        - Windows
        - macOS
    validations:
      required: true

  - type: dropdown
    id: install_method
    attributes:
      label: Install Method
      description: How did you install CrossMacro?
      options:
        - Flatpak (Flathub)
        - AppImage
        - .deb (Debian/Ubuntu)
        - .rpm (Fedora/RHEL)
        - AUR
        - Nix / NixOS
        - Windows Store
        - winget
        - Portable EXE
        - DMG (macOS)
        - Built from source
    validations:
      required: true

  - type: input
    id: os_version
    attributes:
      label: OS Version
      description: e.g., Arch Linux, Ubuntu 24.04, Fedora 40, NixOS, Windows 11, macOS
      placeholder: Arch Linux / Windows 11 / macOS
    validations:
      required: true

  - type: input
    id: app_version
    attributes:
      label: CrossMacro Version
      description: App version shown in About or `crossmacro --version`
      placeholder: 0.9.9
    validations:
      required: true

  - type: dropdown
    id: linux_mode
    attributes:
      label: Linux Mode (if applicable)
      description: If you're on Linux, which mode are you using?
      options:
        - Daemon mode (socket at /run/crossmacro/crossmacro.sock)
        - Direct mode (Wayland permissions)
        - Not sure / Not Linux

  - type: textarea
    id: description
    attributes:
      label: Describe the Bug
      description: A clear and concise description of what the bug is.
      placeholder: When I press F8 to record...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Please copy and paste any relevant logs.
      render: shell

  - type: textarea
    id: doctor
    attributes:
      label: `crossmacro doctor --json --verbose`
      description: If possible, run `crossmacro doctor --json --verbose` and paste the output.
      render: shell
