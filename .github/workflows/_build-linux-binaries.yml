name: Reusable Linux Binary Build

on:
  workflow_call:
    inputs:
      version:
        description: 'Package/application version to publish.'
        required: true
        type: string
      source_tag:
        description: 'Source tag associated with the build.'
        required: true
        type: string
      canonical_version:
        description: 'Canonical package version for downstream artifacts.'
        required: true
        type: string
      artifact_prefix:
        description: 'Prefix for uploaded Linux binary artifacts.'
        required: true
        type: string
      smoke_enabled:
        description: 'Run smoke checks during binary publishing.'
        required: false
        default: true
        type: boolean
      release_mode:
        description: 'Whether this build is running for release orchestration.'
        required: false
        default: false
        type: boolean
      upload_enabled:
        description: 'Upload published Linux binary artifacts.'
        required: false
        default: true
        type: boolean
      retention_days:
        description: 'Retention period for uploaded Linux binary artifacts.'
        required: false
        default: 7
        type: number

permissions:
  contents: read

jobs:
  build-linux-binaries:
    name: Build Linux Binaries (${{ matrix.arch_suffix }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch_suffix: x64
            runner: ubuntu-latest
            dotnet_rid: linux-x64
            target_arch: x86_64
            daemon_publish_args: ""
          - arch_suffix: arm64
            runner: ubuntu-24.04-arm
            dotnet_rid: linux-arm64
            target_arch: aarch64
            daemon_publish_args: "-p:PublishAot=false --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release_mode && inputs.source_tag || github.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install native publish prerequisites
        if: ${{ matrix.arch_suffix == 'x64' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y clang build-essential

      - name: Publish and smoke Linux artifacts
        env:
          DAEMON_PUBLISH_ARGS: ${{ matrix.daemon_publish_args }}
        run: |
          args=(
            --rid "${{ matrix.dotnet_rid }}" \
            --arch "${{ matrix.target_arch }}" \
            --version "${{ inputs.version }}" \
            --ui-output "publish-linux-${{ matrix.arch_suffix }}" \
            --daemon-output "publish-daemon-${{ matrix.arch_suffix }}"
          )

          if [ -n "$DAEMON_PUBLISH_ARGS" ]; then
            args+=(--daemon-publish-args "$DAEMON_PUBLISH_ARGS")
          fi

          bash scripts/ci/publish-linux-artifacts.sh "${args[@]}"

      - name: Upload Linux UI artifact
        if: ${{ inputs.upload_enabled }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact_prefix }}-ui-${{ matrix.arch_suffix }}-${{ github.run_id }}
          path: publish-linux-${{ matrix.arch_suffix }}/
          retention-days: ${{ inputs.retention_days }}

      - name: Upload Linux daemon artifact
        if: ${{ inputs.upload_enabled }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact_prefix }}-daemon-${{ matrix.arch_suffix }}-${{ github.run_id }}
          path: publish-daemon-${{ matrix.arch_suffix }}/
          retention-days: ${{ inputs.retention_days }}
