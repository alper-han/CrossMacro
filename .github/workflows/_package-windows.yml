name: Reusable Windows Packaging

on:
  workflow_call:
    inputs:
      version:
        description: 'Package/application version to embed in Windows packages.'
        required: true
        type: string
      canonical_version:
        description: 'Canonical package version used in Windows package filenames.'
        required: true
        type: string
      source_tag:
        description: 'Source tag associated with release package builds.'
        required: false
        default: ''
        type: string
      artifact_prefix:
        description: 'Prefix for uploaded Windows package artifacts.'
        required: true
        type: string
      smoke_enabled:
        description: 'Run Windows package smoke checks.'
        required: false
        default: true
        type: boolean
      attach_msix:
        description: 'Build, validate, and upload the MSIX package.'
        required: false
        default: true
        type: boolean
      release_mode:
        description: 'Whether this package build is running for release orchestration.'
        required: false
        default: false
        type: boolean
      upload_enabled:
        description: 'Upload Windows package artifacts.'
        required: false
        default: true
        type: boolean
      retention_days:
        description: 'Retention period for uploaded Windows package artifacts.'
        required: false
        default: 7
        type: number

permissions:
  contents: read

jobs:
  package-windows-portable:
    name: Build and Smoke Windows Portable (${{ matrix.architecture }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: x64
            runner: windows-2025
          - architecture: arm64
            runner: windows-11-arm

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ inputs.release_mode && inputs.source_tag || github.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1
        with:
          dotnet-version: '10.0.x'

      - name: Publish Windows portable EXE
        shell: pwsh
        run: |
          ./scripts/ci/publish-windows-portable.ps1 `
            -Version '${{ inputs.version }}' `
            -Architecture '${{ matrix.architecture }}' `
            -OutputDir publish-windows

      - name: Smoke Windows portable EXE
        if: ${{ inputs.smoke_enabled }}
        shell: pwsh
        run: |
          ./scripts/smoke/windows-portable.ps1 -Path publish-windows

      - name: Stage Windows portable release EXE
        if: ${{ inputs.release_mode }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $files = @(Get-ChildItem -LiteralPath publish-windows -File)
          $exeFiles = @($files | Where-Object { $_.Extension -ieq '.exe' })
          if ($files.Count -ne 1 -or $exeFiles.Count -ne 1) {
              Write-Error "Windows portable publish must contain exactly one EXE before release staging: $($files.Name -join ', ')"
              exit 1
          }

          $renamedExe = 'publish-windows/CrossMacro-${{ inputs.canonical_version }}-win-${{ matrix.architecture }}.exe'
          Move-Item -LiteralPath $exeFiles[0].FullName -Destination $renamedExe

      - name: Verify staged Windows portable EXE
        if: ${{ inputs.release_mode }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $files = @(Get-ChildItem -LiteralPath publish-windows -File)
          $expected = 'CrossMacro-${{ inputs.canonical_version }}-win-${{ matrix.architecture }}.exe'
          $executables = @($files | Where-Object { $_.Name -eq $expected })
          if ($files.Count -ne 1 -or $executables.Count -ne 1) {
              Write-Error "Windows release package must contain exactly one expected EXE and no extra files: $($files.Name -join ', ')"
              exit 1
          }

      - name: Upload Windows portable package
        if: ${{ inputs.upload_enabled }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ inputs.release_mode && format('windows-{0}-package', matrix.architecture) || format('{0}-portable-{1}-{2}', inputs.artifact_prefix, matrix.architecture, github.run_id) }}
          path: publish-windows/*.exe
          retention-days: ${{ inputs.retention_days }}

  package-msix:
    name: Build and Validate MSIX (${{ matrix.architecture }})
    if: ${{ inputs.attach_msix }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: x64
            runner: windows-2025
          - architecture: arm64
            runner: windows-11-arm

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ inputs.release_mode && inputs.source_tag || github.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1
        with:
          dotnet-version: '10.0.x'

      - name: Build MSIX package
        shell: pwsh
        run: |
          ./scripts/msix/build-msix.ps1 `
            -Version '${{ inputs.version }}' `
            -PackageVersion '${{ inputs.canonical_version }}' `
            -Architecture '${{ matrix.architecture }}' `
            -OutputDir msix-content-${{ matrix.architecture }} `
            -PackagePath CrossMacro-${{ inputs.canonical_version }}-${{ matrix.architecture }}.msix

      - name: Smoke MSIX package
        if: ${{ inputs.smoke_enabled }}
        shell: pwsh
        run: |
          $smokeArgs = @{
            Path = 'CrossMacro-${{ inputs.canonical_version }}-${{ matrix.architecture }}.msix'
            ExpectedVersion = '${{ inputs.version }}.0'
            ExpectedArchitecture = '${{ matrix.architecture }}'
          }
          ./scripts/smoke/msix.ps1 @smokeArgs

      - name: Upload MSIX package
        if: ${{ inputs.upload_enabled }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ inputs.release_mode && format('msix-{0}-package', matrix.architecture) || format('{0}-msix-{1}-{2}', inputs.artifact_prefix, matrix.architecture, github.run_id) }}
          path: CrossMacro-${{ inputs.canonical_version }}-${{ matrix.architecture }}.msix
          retention-days: ${{ inputs.retention_days }}

  package-msix-store-upload:
    name: Build MSIX Store Upload
    if: ${{ inputs.attach_msix && inputs.release_mode && inputs.upload_enabled }}
    needs: package-msix
    runs-on: windows-2025

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ inputs.release_mode && inputs.source_tag || github.ref }}

      - name: Download x64 MSIX
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: msix-x64-package
          path: msix-store/packages/

      - name: Download arm64 MSIX
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: msix-arm64-package
          path: msix-store/packages/

      - name: Build MSIX bundle and upload package
        shell: pwsh
        run: |
          ./scripts/msix/build-msix-store-upload.ps1 `
            -Version '${{ inputs.version }}' `
            -PackageVersion '${{ inputs.canonical_version }}' `
            -PackageDir msix-store/packages `
            -BundlePath CrossMacro-${{ inputs.canonical_version }}.msixbundle `
            -UploadPath CrossMacro-${{ inputs.canonical_version }}.msixupload

      - name: Upload MSIX Store artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: msix-store-package
          path: CrossMacro-${{ inputs.canonical_version }}.msixupload
          retention-days: ${{ inputs.retention_days }}
