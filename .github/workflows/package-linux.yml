name: Linux Packages

on:
  push:
    branches: ['**']
    tags-ignore: ['*']
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  linux-package-metadata:
    name: Resolve Linux Package Metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      source_tag: ${{ steps.version.outputs.source_tag }}
      package_version_canonical: ${{ steps.version.outputs.package_version_canonical }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Resolve package metadata
        id: version
        run: |
          bash scripts/ci/resolve-release-metadata.sh --mode ci

  build-linux-binaries:
    name: Build Linux Binaries
    needs: linux-package-metadata
    uses: ./.github/workflows/_build-linux-binaries.yml
    with:
      version: ${{ needs.linux-package-metadata.outputs.version }}
      source_tag: ${{ needs.linux-package-metadata.outputs.source_tag }}
      canonical_version: ${{ needs.linux-package-metadata.outputs.package_version_canonical }}
      artifact_prefix: linux-packages
      smoke_enabled: true
      release_mode: false
      upload_enabled: true
      retention_days: 7

  package-linux:
    name: Build and Smoke Linux Packages
    needs: [linux-package-metadata, build-linux-binaries]
    uses: ./.github/workflows/_package-linux.yml
    with:
      version: ${{ needs.linux-package-metadata.outputs.version }}
      source_tag: ${{ needs.linux-package-metadata.outputs.source_tag }}
      canonical_version: ${{ needs.linux-package-metadata.outputs.package_version_canonical }}
      artifact_prefix: linux-packages
      smoke_enabled: true
      release_mode: false
      upload_enabled: true
      retention_days: 7
      build_run_id: ${{ github.run_id }}
      attach_flatpak: true
