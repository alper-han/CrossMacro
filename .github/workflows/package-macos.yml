name: macOS Packages

on:
  push:
    branches: ['**']
    tags-ignore: ['*']
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  macos-package-metadata:
    name: Resolve macOS Package Metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      source_tag: ${{ steps.version.outputs.source_tag }}
      package_version_canonical: ${{ steps.version.outputs.package_version_canonical }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Resolve package metadata
        id: version
        run: |
          bash scripts/ci/resolve-release-metadata.sh --mode ci

  package-macos:
    name: Build and Smoke macOS DMG Packages
    needs: macos-package-metadata
    uses: ./.github/workflows/_package-macos.yml
    with:
      version: ${{ needs.macos-package-metadata.outputs.version }}
      source_tag: ${{ needs.macos-package-metadata.outputs.source_tag }}
      canonical_version: ${{ needs.macos-package-metadata.outputs.package_version_canonical }}
      artifact_prefix: macos-packages
      smoke_enabled: true
      release_mode: false
      upload_enabled: true
      retention_days: 90
