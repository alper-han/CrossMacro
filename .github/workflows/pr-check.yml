name: PR Check

# Transitional compatibility workflow. It keeps the historical required check and
# package-adjacent gates until ci.yml plus the split package workflows have passed
# on the remote branch and branch protection can move to those replacement checks.

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

permissions:
  contents: read

jobs:
  workflow-validation:
    name: Validate Workflow Syntax and Policy
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

    - name: Run actionlint
      env:
        ACTIONLINT_VERSION: 1.7.12
      run: |
        set -euo pipefail
        curl -sSfL "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" -o actionlint.tar.gz
        tar -xzf actionlint.tar.gz actionlint
        ./actionlint -color

    - name: Verify validator CLI help
      run: |
        set -euo pipefail
        python3 scripts/ci/verify_workflow_triggers.py --help
        python3 scripts/ci/verify_workflow_security.py --help
        python3 scripts/ci/verify_reusable_workflows.py --help
        python3 scripts/ci/verify_artifacts.py --help

    - name: Validate workflow security policy
      run: |
        set -euo pipefail
        python3 scripts/ci/verify_workflow_security.py

    - name: Validate current reusable workflow policy
      run: |
        set -euo pipefail
        python3 scripts/ci/verify_reusable_workflows.py

    - name: Advisory future workflow trigger policy
      run: |
        set -euo pipefail
        echo "Advisory: future split workflow files and release trigger cleanup are handled by later CI/CD decomposition tasks."
        python3 scripts/ci/verify_workflow_triggers.py || true

  pr-release-metadata:
    name: Resolve PR Release Metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      source_tag: ${{ steps.version.outputs.source_tag }}
      package_version_canonical: ${{ steps.version.outputs.package_version_canonical }}

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

    - name: Resolve package metadata
      id: version
      run: |
        bash scripts/ci/resolve-release-metadata.sh --mode ci
  build-linux:
    name: Build and Test (Linux)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

    - name: Setup .NET
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7
      with:
        dotnet-version: '10.0.x'

    - name: Verify version sync
      run: |
        chmod +x scripts/sync-version.sh
        ./scripts/sync-version.sh --check

    - name: Verify version sync write idempotency
      run: |
        VERSION="$(tr -d '\r\n[:space:]' < VERSION)" ./scripts/sync-version.sh --write
        git diff --exit-code -- scripts/packaging/arch/PKGBUILD scripts/msix/AppxManifest.xml flatpak/io.github.alper_han.crossmacro.flathub.yml

    - name: Setup Flatpak tooling
      run: |
        sudo apt-get update
        sudo apt-get install -y dbus flatpak
        flatpak --version
        flatpak --user remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
        flatpak --user install -y flathub org.flatpak.Builder

    - name: Validate Flatpak manifest and MetaInfo
      run: |
        set -euo pipefail

        # Local development manifest
        flatpak --user run --command=flatpak-builder-lint org.flatpak.Builder --exceptions manifest flatpak/io.github.alper_han.crossmacro.yml

        # Flathub mirror manifest: ignore filename mismatch in this repository only
        set +e
        flathub_lint_output="$(flatpak --user run --command=flatpak-builder-lint org.flatpak.Builder --exceptions manifest flatpak/io.github.alper_han.crossmacro.flathub.yml 2>&1)"
        flathub_lint_rc=$?
        set -e
        if [ "$flathub_lint_rc" -ne 0 ]; then
          if ! printf '%s\n' "$flathub_lint_output" | python3 -c 'import json,sys; obj=json.loads(sys.stdin.read().strip()); errs=obj.get("errors", []); sys.exit(0 if errs == ["appid-filename-mismatch"] else 1)'; then
            printf '%s\n' "$flathub_lint_output"
            exit "$flathub_lint_rc"
          fi
          echo "Ignoring appid-filename-mismatch for mirrored manifest filename."
        fi

        # AppStream checks
        flatpak --user run --command=flatpak-builder-lint org.flatpak.Builder appstream flatpak/io.github.alper_han.crossmacro.metainfo.xml
        flatpak --user run --command=appstreamcli org.flatpak.Builder validate --pedantic --explain flatpak/io.github.alper_han.crossmacro.metainfo.xml

    - name: Validate man page source
      run: |
        man -l docs/man/crossmacro.1 > /dev/null

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Debug --no-restore

    - name: CLI Smoke (Linux)
      run: |
        set -euo pipefail
        PROJECT="src/CrossMacro.UI.Linux/CrossMacro.UI.Linux.csproj"

        help_output="$(dotnet run --no-build --project "$PROJECT" -- --help 2>&1)"
        echo "$help_output"
        echo "$help_output" | grep -F "Usage:"

        set +e
        json_parse_output="$(dotnet run --no-build --project "$PROJECT" -- --json 2>&1)"
        json_parse_code=$?
        set -e
        echo "$json_parse_output"
        test "$json_parse_code" -eq 2
        echo "$json_parse_output" | grep -F '"status": "error"'
        echo "$json_parse_output" | grep -F '"code": 2'

        set +e
        dry_run_output="$(dotnet run --no-build --project "$PROJECT" -- run --step "move abs 10 10" --dry-run --json 2>&1)"
        dry_run_code=$?
        set -e
        echo "$dry_run_output"
        echo "$dry_run_output" | grep -F '"status":'
        echo "$dry_run_output" | grep -F "\"code\": $dry_run_code"

    - name: CLI Daemon Smoke (Linux, env-gated)
      if: ${{ vars.CROSSMACRO_LINUX_DAEMON_SMOKE == '1' }}
      run: |
        set -euo pipefail
        UI_PROJECT="src/CrossMacro.UI.Linux/CrossMacro.UI.Linux.csproj"
        DAEMON_PROJECT="src/CrossMacro.Daemon/CrossMacro.Daemon.csproj"

        dotnet run --no-build --project "$DAEMON_PROJECT" > daemon-smoke.log 2>&1 &
        daemon_pid=$!

        cleanup() {
          kill "$daemon_pid" 2>/dev/null || true
          wait "$daemon_pid" 2>/dev/null || true
        }
        trap cleanup EXIT

        for _ in $(seq 1 30); do
          if [ -S "/run/crossmacro/crossmacro.sock" ] || [ -S "/tmp/crossmacro.sock" ]; then
            break
          fi
          sleep 1
        done

        if ! [ -S "/run/crossmacro/crossmacro.sock" ] && ! [ -S "/tmp/crossmacro.sock" ]; then
          echo "Daemon socket was not created."
          cat daemon-smoke.log || true
          exit 1
        fi

        set +e
        doctor_output="$(dotnet run --no-build --project "$UI_PROJECT" -- doctor --json --verbose 2>&1)"
        doctor_code=$?
        set -e
        echo "$doctor_output"
        echo "doctor exit code: $doctor_code"
        echo "$doctor_output" | grep -F '"name": "linux-daemon-handshake"'
        echo "$doctor_output" | grep -F 'Daemon handshake probe succeeded.'

    - name: Run Tests (Linux-compatible suites)
      run: |
        dotnet test tests/CrossMacro.Core.Tests/CrossMacro.Core.Tests.csproj --configuration Debug --no-build --verbosity normal
        dotnet test tests/CrossMacro.Cli.Tests/CrossMacro.Cli.Tests.csproj --configuration Debug --no-build --verbosity normal
        dotnet test tests/CrossMacro.Daemon.Tests/CrossMacro.Daemon.Tests.csproj --configuration Debug --no-build --verbosity normal
        dotnet test tests/CrossMacro.Infrastructure.Tests/CrossMacro.Infrastructure.Tests.csproj --configuration Debug --no-build --verbosity normal
        dbus-run-session -- dotnet test tests/CrossMacro.Platform.Linux.Tests/CrossMacro.Platform.Linux.Tests.csproj --configuration Debug --no-build --verbosity normal
        dotnet test tests/CrossMacro.UI.Tests/CrossMacro.UI.Tests.csproj --configuration Debug --no-build --verbosity normal

  smoke-published-linux-artifacts:
    name: Publish and Smoke Linux Artifacts (${{ matrix.arch_suffix }})
    needs: pr-release-metadata
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch_suffix: x64
            runner: ubuntu-latest
            dotnet_rid: linux-x64
            target_arch: x86_64
            daemon_publish_args: ""
          - arch_suffix: arm64
            runner: ubuntu-24.04-arm
            dotnet_rid: linux-arm64
            target_arch: aarch64
            daemon_publish_args: ""

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

    - name: Setup .NET
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7
      with:
        dotnet-version: '10.0.x'

    - name: Install native publish prerequisites
      run: |
        sudo apt-get update
        sudo apt-get install -y clang build-essential zlib1g-dev

    - name: Publish and smoke Linux artifacts
      env:
        DAEMON_PUBLISH_ARGS: ${{ matrix.daemon_publish_args }}
      run: |
        args=(
          --rid "${{ matrix.dotnet_rid }}" \
          --arch "${{ matrix.target_arch }}" \
          --version "${{ needs.pr-release-metadata.outputs.version }}" \
          --ui-output "publish-linux-${{ matrix.arch_suffix }}" \
          --daemon-output "publish-daemon-${{ matrix.arch_suffix }}"
        )

        if [ -n "$DAEMON_PUBLISH_ARGS" ]; then
          args+=(--daemon-publish-args "$DAEMON_PUBLISH_ARGS")
        fi

        bash scripts/ci/publish-linux-artifacts.sh "${args[@]}"

    - name: Upload Linux UI artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: pr-check-linux-binary-${{ matrix.arch_suffix }}-${{ github.run_id }}
        path: publish-linux-${{ matrix.arch_suffix }}/
        retention-days: 7

    - name: Upload Linux daemon artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: pr-check-linux-daemon-${{ matrix.arch_suffix }}-${{ github.run_id }}
        path: publish-daemon-${{ matrix.arch_suffix }}/
        retention-days: 7

  package-deb-pr:
    name: Package and Smoke DEB (${{ matrix.arch_suffix }})
    needs: [pr-release-metadata, smoke-published-linux-artifacts]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch_suffix: x64
            runner: ubuntu-latest
            target_arch: x86_64
            docker_platform: linux/amd64
          - arch_suffix: arm64
            runner: ubuntu-24.04-arm
            target_arch: aarch64
            docker_platform: linux/arm64

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

    - name: Download Linux UI artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
      with:
        name: pr-check-linux-binary-${{ matrix.arch_suffix }}-${{ github.run_id }}
        path: publish/

    - name: Download Linux daemon artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
      with:
        name: pr-check-linux-daemon-${{ matrix.arch_suffix }}-${{ github.run_id }}
        path: publish-daemon/

    - name: Install packaging tools
      run: |
        sudo apt-get update
        sudo apt-get install -y dpkg-dev fakeroot patchelf

    - name: Build DEB package
      run: |
        cd scripts
        chmod +x build_deb.sh
        VERSION="${{ needs.pr-release-metadata.outputs.version }}" SOURCE_TAG="${{ needs.pr-release-metadata.outputs.source_tag }}" PACKAGE_VERSION_CANONICAL="${{ needs.pr-release-metadata.outputs.package_version_canonical }}" TARGET_ARCH="${{ matrix.target_arch }}" PUBLISH_DIR="../publish" DAEMON_DIR="../publish-daemon" ./build_deb.sh

    - name: Verify DEB contents
      run: |
        set -euo pipefail
        deb_file="$(find scripts -maxdepth 1 -type f -name '*.deb' -print | sort | head -n 1)"
        dpkg-deb -c "$deb_file" | grep -E '/usr/share/man/man1/crossmacro\.1\.gz$'

    - name: Smoke DEB install and CLI
      run: |
        set -euo pipefail
        deb_file="$(find scripts -maxdepth 1 -type f -name '*.deb' -print | sort | head -n 1)"
        docker run --rm --platform "${{ matrix.docker_platform }}" \
          --tmpfs /run \
          -v "$PWD/scripts":/artifacts:ro \
          -e DEB_FILE_NAME="$(basename "$deb_file")" \
          ubuntu:24.04 \
          bash -lc '
            set -euo pipefail
            export DEBIAN_FRONTEND=noninteractive
            apt-get update >/dev/null
            apt-get install -y systemd dbus polkitd udev man-db libxtst6 libx11-6 libxcursor1 libxrandr2 fontconfig sudo >/dev/null
            dpkg -i "/artifacts/${DEB_FILE_NAME}" >/dev/null || apt-get install -f -y >/dev/null
            getent group crossmacro >/dev/null
            getent passwd crossmacro >/dev/null
            /usr/bin/crossmacro --help | grep -F "Usage:"
            /usr/bin/crossmacro settings get --json | grep -F "\"status\": \"ok\""
            /usr/bin/crossmacro run --step "move abs 10 10" --step "click left" --dry-run --json | grep -F "\"coordinateMode\": \"absolute\""
          '

  package-rpm-pr:
    name: Package and Smoke RPM (${{ matrix.arch_suffix }})
    needs: [pr-release-metadata, smoke-published-linux-artifacts]
    runs-on: ${{ matrix.runner }}
    env:
      FEDORA_IMAGE: fedora:41
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch_suffix: x64
            runner: ubuntu-latest
            target_arch: x86_64
            rpm_arch: x86_64
            docker_platform: linux/amd64
          - arch_suffix: arm64
            runner: ubuntu-24.04-arm
            target_arch: aarch64
            rpm_arch: aarch64
            docker_platform: linux/arm64

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

    - name: Download Linux UI artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
      with:
        name: pr-check-linux-binary-${{ matrix.arch_suffix }}-${{ github.run_id }}
        path: publish/

    - name: Download Linux daemon artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
      with:
        name: pr-check-linux-daemon-${{ matrix.arch_suffix }}-${{ github.run_id }}
        path: publish-daemon/

    - name: Build RPM package in Fedora
      run: |
        docker run --rm --platform "${{ matrix.docker_platform }}" \
          -v "$PWD":/work \
          -w /work/scripts \
          "$FEDORA_IMAGE" \
          bash -lc '
            set -euo pipefail
            dnf -y install rpm-build checkpolicy policycoreutils patchelf file >/dev/null
            VERSION="${{ needs.pr-release-metadata.outputs.version }}" SOURCE_TAG="${{ needs.pr-release-metadata.outputs.source_tag }}" PACKAGE_VERSION_CANONICAL="${{ needs.pr-release-metadata.outputs.package_version_canonical }}" TARGET_ARCH="${{ matrix.target_arch }}" RPM_ARCH="${{ matrix.rpm_arch }}" PUBLISH_DIR=/work/publish DAEMON_DIR=/work/publish-daemon ./build_rpm.sh
          '

    - name: Verify RPM contents and dependencies
      run: |
        set -euo pipefail
        rpm_file="$(find scripts -maxdepth 1 -type f -name '*.rpm' | head -n 1)"
        rpm_file_name="$(basename "$rpm_file")"
        docker run --rm --platform "${{ matrix.docker_platform }}" \
          -v "$PWD/scripts":/artifacts:ro \
          -e RPM_FILE_NAME="$rpm_file_name" \
          "$FEDORA_IMAGE" \
          bash -lc '
            set -euo pipefail
            dnf -y install rpm >/dev/null
            rpm -qpl "/artifacts/${RPM_FILE_NAME}" | grep -E "^/usr/share/man/man1/crossmacro\.1(\.gz)?$"
            requires="$(rpm -qpR "/artifacts/${RPM_FILE_NAME}")"
            printf "%s\n" "$requires" | grep -Fx libicu
          '

    - name: Smoke RPM install and CLI
      run: |
        set -euo pipefail
        rpm_file="$(find scripts -maxdepth 1 -type f -name '*.rpm' | head -n 1)"
        rpm_file_name="$(basename "$rpm_file")"
        docker run --rm --platform "${{ matrix.docker_platform }}" \
          -v "$PWD/scripts":/artifacts:ro \
          -e RPM_FILE_NAME="$rpm_file_name" \
          "$FEDORA_IMAGE" \
          bash -lc '
            set -euo pipefail
            dnf -y install polkit libXtst libX11 libXcursor libXrandr fontconfig >/dev/null
            dnf -y install "/artifacts/${RPM_FILE_NAME}" >/dev/null
            /usr/bin/crossmacro --help | grep -F "Usage:"
            /usr/bin/crossmacro settings get --json | grep -F "\"status\": \"ok\""
            /usr/bin/crossmacro run --step "move abs 10 10" --step "click left" --dry-run --json | grep -F "\"coordinateMode\": \"absolute\""
          '

  package-appimage-pr:
    name: Package and Smoke AppImage (${{ matrix.arch_suffix }})
    needs: [pr-release-metadata, smoke-published-linux-artifacts]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch_suffix: x64
            runner: ubuntu-24.04
            target_arch: x86_64
            appimage_arch: x86_64
            appimagetool_host_arch: x86_64
            appimagetool_sha256: ed4ce84f0d9caff66f50bcca6ff6f35aae54ce8135408b3fa33abfc3cb384eb0
          - arch_suffix: arm64
            runner: ubuntu-24.04-arm
            target_arch: aarch64
            appimage_arch: aarch64
            appimagetool_host_arch: aarch64
            appimagetool_sha256: f0837e7448a0c1e4e650a93bb3e85802546e60654ef287576f46c71c126a9158

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

    - name: Download Linux UI artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
      with:
        name: pr-check-linux-binary-${{ matrix.arch_suffix }}-${{ github.run_id }}
        path: publish/

    - name: Install packaging tools
      run: |
        sudo apt-get update
        sudo apt-get install -y file desktop-file-utils patchelf jq pkg-config libxtst6 libicu74

    - name: Build AppImage
      run: |
        cd scripts
        chmod +x build_appimage.sh
        VERSION="${{ needs.pr-release-metadata.outputs.version }}" SOURCE_TAG="${{ needs.pr-release-metadata.outputs.source_tag }}" PACKAGE_VERSION_CANONICAL="${{ needs.pr-release-metadata.outputs.package_version_canonical }}" TARGET_ARCH="${{ matrix.target_arch }}" APPIMAGE_ARCH="${{ matrix.appimage_arch }}" APPIMAGETOOL_HOST_ARCH="${{ matrix.appimagetool_host_arch }}" APPIMAGETOOL_SHA256="${{ matrix.appimagetool_sha256 }}" PUBLISH_DIR="../publish" APPIMAGE_EXTRACT_AND_RUN=1 ./build_appimage.sh

    - name: Smoke AppImage
      run: |
        set -euo pipefail
        appimage="$(find scripts -maxdepth 1 -type f -name '*-${{ matrix.appimage_arch }}.AppImage' -print | sort | head -n 1)"
        chmod +x "$appimage"
        APPIMAGE_EXTRACT_AND_RUN=1 scripts/smoke/appimage.sh "$appimage"

  package-flatpak-pr:
    name: Package Flatpak (${{ matrix.arch_suffix }})
    needs: [pr-release-metadata, smoke-published-linux-artifacts]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch_suffix: x64
            runner: ubuntu-latest
            target_arch: x86_64
            flatpak_arch: x86_64
          - arch_suffix: arm64
            runner: ubuntu-24.04-arm
            target_arch: aarch64
            flatpak_arch: aarch64

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

    - name: Install Flatpak tools
      run: |
        sudo apt-get update
        sudo apt-get install -y flatpak flatpak-builder
        flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
        flatpak install --user -y flathub org.freedesktop.Platform//25.08 org.freedesktop.Sdk//25.08

    - name: Build Flatpak bundle
      run: |
        cd scripts
        chmod +x build_flatpak.sh
        VERSION="${{ needs.pr-release-metadata.outputs.version }}" SOURCE_TAG="${{ needs.pr-release-metadata.outputs.source_tag }}" PACKAGE_VERSION_CANONICAL="${{ needs.pr-release-metadata.outputs.package_version_canonical }}" TARGET_ARCH="${{ matrix.target_arch }}" FLATPAK_ARCH="${{ matrix.flatpak_arch }}" ./build_flatpak.sh

    - name: Verify Flatpak bundle exists
      run: |
        test -f "flatpak/io.github.alper_han.crossmacro-${{ needs.pr-release-metadata.outputs.package_version_canonical }}-${{ matrix.flatpak_arch }}.flatpak"

    - name: Smoke Flatpak CLI
      run: |
        set -euo pipefail
        bundle="flatpak/io.github.alper_han.crossmacro-${{ needs.pr-release-metadata.outputs.package_version_canonical }}-${{ matrix.flatpak_arch }}.flatpak"
        flatpak --user install -y "$bundle"
        flatpak run io.github.alper_han.crossmacro --help | grep -F "Usage:"
        flatpak run io.github.alper_han.crossmacro settings get --json | grep -F '"status": "ok"'
        flatpak run io.github.alper_han.crossmacro run --step "move abs 10 10" --step "click left" --dry-run --json | grep -F '"coordinateMode": "absolute"'

  build-windows:
    name: Build (Windows)
    runs-on: windows-2025

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

    - name: Setup .NET
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Debug --no-restore

    - name: Validate MSIX prepare script idempotency
      shell: pwsh
      run: |
        $version = (Get-Content VERSION -Raw).Trim()
        $outputDir = Join-Path $env:RUNNER_TEMP "msix-prepare-test"
        Remove-Item -LiteralPath $outputDir -Recurse -Force -ErrorAction SilentlyContinue

        ./scripts/msix/prepare-msix.ps1 -Version $version -OutputDir $outputDir
        ./scripts/msix/prepare-msix.ps1 -Version $version -OutputDir $outputDir

        [xml]$manifest = Get-Content -LiteralPath (Join-Path $outputDir "AppxManifest.xml") -Raw
        $namespaceManager = New-Object System.Xml.XmlNamespaceManager($manifest.NameTable)
        $namespaceManager.AddNamespace("appx", "http://schemas.microsoft.com/appx/manifest/foundation/windows10")
        $identity = $manifest.SelectSingleNode("/appx:Package/appx:Identity", $namespaceManager)
        if ($null -eq $identity) {
          throw "Prepared manifest does not contain Identity node."
        }
        if ($identity.Version -ne "$version.0") {
          throw "Prepared manifest version '$($identity.Version)' does not match expected '$version.0'."
        }

    - name: CLI Smoke (Windows)
      shell: pwsh
      run: |
        $project = "src/CrossMacro.UI.Windows/CrossMacro.UI.Windows.csproj"

        $helpOutput = (& dotnet run --no-build --project $project -- --help 2>&1 | Out-String)
        if (-not ($helpOutput -match "Usage:")) {
          throw "Top-level help output does not contain Usage."
        }

        $jsonParseOutput = (& dotnet run --no-build --project $project -- --json 2>&1 | Out-String)
        $jsonParseCode = $LASTEXITCODE
        if ($jsonParseCode -ne 2) {
          throw "Expected exit code 2 for standalone --json, got $jsonParseCode."
        }
        if (-not ($jsonParseOutput -match '"status":\s*"error"')) {
          throw "Standalone --json output is not JSON error envelope."
        }
        if (-not ($jsonParseOutput -match '"code":\s*2')) {
          throw "Standalone --json output code is not 2."
        }

        $dryRunOutput = (& dotnet run --no-build --project $project -- run --step "move abs 10 10" --dry-run --json 2>&1 | Out-String)
        $dryRunCode = $LASTEXITCODE
        if (-not ($dryRunOutput -match '"status":\s*"(ok|error)"')) {
          throw "Dry-run output missing JSON status envelope."
        }
        if (-not ($dryRunOutput -match ('"code":\s*{0}' -f $dryRunCode))) {
          throw "Dry-run output code does not match process exit code ($dryRunCode)."
        }

    - name: Run Tests (Windows-compatible suites)
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        $projects = @(
          "tests/CrossMacro.Core.Tests/CrossMacro.Core.Tests.csproj",
          "tests/CrossMacro.Cli.Tests/CrossMacro.Cli.Tests.csproj",
          "tests/CrossMacro.Daemon.Tests/CrossMacro.Daemon.Tests.csproj",
          "tests/CrossMacro.Infrastructure.Tests/CrossMacro.Infrastructure.Tests.csproj",
          "tests/CrossMacro.Platform.Windows.Tests/CrossMacro.Platform.Windows.Tests.csproj",
          "tests/CrossMacro.UI.Tests/CrossMacro.UI.Tests.csproj"
        )

        foreach ($project in $projects) {
          dotnet test $project --configuration Debug --no-build --verbosity normal
          if ($LASTEXITCODE -ne 0) {
            throw "dotnet test failed for $project with exit code $LASTEXITCODE."
          }
        }

  package-windows-portable-pr:
    name: Package and Smoke Windows Portable (${{ matrix.architecture }})
    needs: pr-release-metadata
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: x64
            runtime: win-x64
            runner: windows-2025
          - architecture: arm64
            runtime: win-arm64
            runner: windows-11-arm

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

    - name: Setup .NET
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7
      with:
        dotnet-version: '10.0.x'

    - name: Publish and smoke Windows portable package
      shell: pwsh
      run: |
        ./scripts/ci/publish-windows-portable.ps1 `
          -Version '${{ needs.pr-release-metadata.outputs.version }}' `
          -Architecture '${{ matrix.architecture }}' `
          -OutputDir publish-windows

  package-msix-pr:
    name: Package MSIX (${{ matrix.architecture }})
    needs: pr-release-metadata
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: x64
            runner: windows-2025
          - architecture: arm64
            runner: windows-11-arm

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

    - name: Setup .NET
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7
      with:
        dotnet-version: '10.0.x'

    - name: Build and smoke MSIX package
      shell: pwsh
      run: |
        ./scripts/msix/build-msix.ps1 `
          -Version '${{ needs.pr-release-metadata.outputs.version }}' `
          -PackageVersion '${{ needs.pr-release-metadata.outputs.package_version_canonical }}' `
          -Architecture '${{ matrix.architecture }}' `
          -OutputDir msix-content-${{ matrix.architecture }} `
          -PackagePath CrossMacro-${{ needs.pr-release-metadata.outputs.package_version_canonical }}-${{ matrix.architecture }}.msix

    - name: Verify MSIX package exists
      shell: pwsh
      run: |
        if (-not (Test-Path -LiteralPath "CrossMacro-${{ needs.pr-release-metadata.outputs.package_version_canonical }}-${{ matrix.architecture }}.msix" -PathType Leaf)) {
          throw "MSIX package was not created."
        }

  build-macos:
    name: Build (macOS)
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

    - name: Setup .NET
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Debug --no-restore

    - name: CLI Smoke (macOS)
      run: |
        set -euo pipefail
        PROJECT="src/CrossMacro.UI.MacOS/CrossMacro.UI.MacOS.csproj"

        help_output="$(dotnet run --no-build --project "$PROJECT" -- --help 2>&1)"
        echo "$help_output"
        echo "$help_output" | grep -F "Usage:"

        set +e
        json_parse_output="$(dotnet run --no-build --project "$PROJECT" -- --json 2>&1)"
        json_parse_code=$?
        set -e
        echo "$json_parse_output"
        test "$json_parse_code" -eq 2
        echo "$json_parse_output" | grep -F '"status": "error"'
        echo "$json_parse_output" | grep -F '"code": 2'

        set +e
        dry_run_output="$(dotnet run --no-build --project "$PROJECT" -- run --step "move abs 10 10" --dry-run --json 2>&1)"
        dry_run_code=$?
        set -e
        echo "$dry_run_output"
        echo "$dry_run_output" | grep -F '"status":'
        echo "$dry_run_output" | grep -F "\"code\": $dry_run_code"

    - name: Run Tests (macOS-compatible suites)
      run: |
        dotnet test tests/CrossMacro.Core.Tests/CrossMacro.Core.Tests.csproj --configuration Debug --no-build --verbosity normal
        dotnet test tests/CrossMacro.Cli.Tests/CrossMacro.Cli.Tests.csproj --configuration Debug --no-build --verbosity normal
        dotnet test tests/CrossMacro.Daemon.Tests/CrossMacro.Daemon.Tests.csproj --configuration Debug --no-build --verbosity normal
        dotnet test tests/CrossMacro.Infrastructure.Tests/CrossMacro.Infrastructure.Tests.csproj --configuration Debug --no-build --verbosity normal
        dotnet test tests/CrossMacro.Platform.MacOS.Tests/CrossMacro.Platform.MacOS.Tests.csproj --configuration Debug --no-build --verbosity normal
        dotnet test tests/CrossMacro.UI.Tests/CrossMacro.UI.Tests.csproj --configuration Debug --no-build --verbosity normal

  package-macos-dmg-pr:
    name: Package macOS DMG (${{ matrix.rid }})
    needs: pr-release-metadata
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: osx-arm64
            target_arch: aarch64
          - rid: osx-x64
            target_arch: x86_64

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

    - name: Setup .NET
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7
      with:
        dotnet-version: '10.0.x'

    - name: Install create-dmg
      run: |
        brew install create-dmg

    - name: Build DMG package
      run: |
        chmod +x scripts/build_macos.sh
        RID="${{ matrix.rid }}" VERSION="${{ needs.pr-release-metadata.outputs.version }}" SOURCE_TAG="${{ needs.pr-release-metadata.outputs.source_tag }}" PACKAGE_VERSION_CANONICAL="${{ needs.pr-release-metadata.outputs.package_version_canonical }}" TARGET_ARCH="${{ matrix.target_arch }}" ./scripts/build_macos.sh

    - name: Verify DMG package contents
      run: |
        set -euo pipefail
        dmg="$(find scripts/macos_output -maxdepth 1 -type f -name '*.dmg' -print | sort | head -n 1)"
        mount_dir="$(mktemp -d)"
        hdiutil attach "$dmg" -mountpoint "$mount_dir" -nobrowse -quiet
        trap 'hdiutil detach "$mount_dir" -quiet || true; rmdir "$mount_dir" || true' EXIT
        test -d "$mount_dir/CrossMacro.app"
        test -x "$mount_dir/CrossMacro.app/Contents/MacOS/CrossMacro.UI"
