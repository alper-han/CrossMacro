name: Build and Release
run-name: CrossMacro ${{ inputs.source_tag }}

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: 'Required source tag to build, for example v1.2.3 or v1.2.3-pre.1'
        required: true
        type: string
      publish_release:
        description: 'Create or update the GitHub Release and allow external publishing'
        type: boolean
        required: false
        default: false
      publish_existing_release:
        description: 'Retry selected external publishing against an existing GitHub Release without uploading release assets'
        type: boolean
        required: false
        default: false
      draft:
        description: 'Create or update the GitHub Release as a draft'
        type: boolean
        required: false
        default: true
      prerelease:
        description: 'GitHub Release prerelease flag: auto derives from source_tag'
        type: choice
        required: false
        default: auto
        options:
          - auto
          - 'true'
          - 'false'
      attach_flatpak:
        description: 'Build, validate, and attach Flatpak bundles'
        type: boolean
        required: false
        default: true
      attach_msix:
        description: 'Build, validate, and attach MSIX package'
        type: boolean
        required: false
        default: true
      publish_aur:
        description: 'Publish AUR package after GitHub Release publishing succeeds'
        type: boolean
        required: false
        default: false
      publish_winget:
        description: 'Publish WinGet package after GitHub Release publishing succeeds'
        type: boolean
        required: false
        default: false

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  # ============================================
  # Stage 1: Build Core Binaries (shared by all)
  # ============================================
  build-core:
    name: Build Core Binaries
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_prerelease_release: ${{ steps.version.outputs.is_prerelease_release }}
      source_tag: ${{ steps.version.outputs.source_tag }}
      package_version_canonical: ${{ steps.version.outputs.package_version_canonical }}
      prerelease_label: ${{ steps.version.outputs.prerelease_label }}
      source_tag_sha: ${{ steps.tag_sha.outputs.source_tag_sha }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    
    - name: Extract version
      id: version
      env:
        INPUT_SOURCE_TAG: ${{ github.event.inputs.source_tag }}
      run: |
        set -euo pipefail
        bash scripts/ci/resolve-release-metadata.sh \
          --mode release \
          --source-tag "$INPUT_SOURCE_TAG" \
          --enforce-version-file-match

    - name: Resolve source tag commit SHA
      id: tag_sha
      env:
        INPUT_SOURCE_TAG: ${{ github.event.inputs.source_tag }}
      run: |
        set -euo pipefail
        # Dereference annotated tags to the commit they point to (^{} suffix).
        # Lightweight tags do not produce a ^{} line, so fall back to the plain ref.
        SHA="$(git ls-remote origin "refs/tags/$INPUT_SOURCE_TAG^{}" 2>/dev/null | cut -f1)"
        if [ -z "$SHA" ]; then
          SHA="$(git ls-remote origin "refs/tags/$INPUT_SOURCE_TAG" 2>/dev/null | cut -f1)"
        fi
        if [ -z "$SHA" ]; then
          echo "ERROR: could not resolve commit SHA for tag $INPUT_SOURCE_TAG" >&2
          exit 1
        fi
        echo "source_tag_sha=${SHA}" >> "$GITHUB_OUTPUT"

    - name: Sync versioned manifests
      run: |
        chmod +x scripts/sync-version.sh
        VERSION="${{ steps.version.outputs.version }}" ./scripts/sync-version.sh --check
    
    - name: Verify version sync write idempotency
      run: |
        VERSION="${{ steps.version.outputs.version }}" ./scripts/sync-version.sh --write
        git diff --exit-code -- scripts/packaging/arch/PKGBUILD scripts/msix/AppxManifest.xml flatpak/io.github.alper_han.crossmacro.flathub.yml

    - name: Validate man page source
      run: |
        man -l docs/man/crossmacro.1 > /dev/null

  build-linux-binaries:
    name: Build Linux Binaries
    needs: build-core
    if: github.event.inputs.publish_existing_release != 'true'
    uses: ./.github/workflows/_build-linux-binaries.yml
    with:
      version: ${{ needs.build-core.outputs.version }}
      source_tag: ${{ needs.build-core.outputs.source_tag }}
      canonical_version: ${{ needs.build-core.outputs.package_version_canonical }}
      artifact_prefix: linux-packages
      smoke_enabled: true
      release_mode: true
      upload_enabled: true
      retention_days: 1

  package-linux:
    name: Package Linux
    needs: [build-core, build-linux-binaries]
    if: github.event.inputs.publish_existing_release != 'true'
    uses: ./.github/workflows/_package-linux.yml
    with:
      version: ${{ needs.build-core.outputs.version }}
      source_tag: ${{ needs.build-core.outputs.source_tag }}
      canonical_version: ${{ needs.build-core.outputs.package_version_canonical }}
      artifact_prefix: linux-packages
      smoke_enabled: true
      release_mode: true
      upload_enabled: true
      retention_days: 1
      build_run_id: ${{ github.run_id }}
      attach_flatpak: ${{ github.event.inputs.attach_flatpak == 'true' }}

  package-windows:
    name: Package Windows
    needs: build-core
    if: github.event.inputs.publish_existing_release != 'true'
    uses: ./.github/workflows/_package-windows.yml
    with:
      version: ${{ needs.build-core.outputs.version }}
      canonical_version: ${{ needs.build-core.outputs.package_version_canonical }}
      source_tag: ${{ needs.build-core.outputs.source_tag }}
      artifact_prefix: windows-packages
      smoke_enabled: true
      attach_msix: ${{ github.event.inputs.attach_msix == 'true' }}
      release_mode: true
      upload_enabled: true
      retention_days: 1

  package-macos:
    name: Package macOS
    needs: build-core
    if: github.event.inputs.publish_existing_release != 'true'
    uses: ./.github/workflows/_package-macos.yml
    with:
      version: ${{ needs.build-core.outputs.version }}
      source_tag: ${{ needs.build-core.outputs.source_tag }}
      canonical_version: ${{ needs.build-core.outputs.package_version_canonical }}
      artifact_prefix: macos-packages
      smoke_enabled: true
      release_mode: true
      upload_enabled: true
      retention_days: 1

  # ============================================
  # Stage 3: Stage and Validate Release Assets
  # ============================================
  stage-release-assets:
    name: Stage Release Assets
    needs: [build-core, package-linux, package-windows, package-macos]
    if: |
      always() &&
      !cancelled() &&
      github.event.inputs.publish_existing_release != 'true' &&
      needs.build-core.result == 'success' &&
      needs.package-linux.result == 'success' &&
      needs.package-windows.result == 'success' &&
      needs.package-macos.result == 'success'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        ref: ${{ needs.build-core.outputs.source_tag }}

    - name: Download all artifacts
      uses: actions/download-artifact@v8
      with:
        path: artifacts/

    - name: Stage release files
      run: |
        set -euo pipefail
        mkdir -p release-staging
        shopt -s nullglob

        files=(
          artifacts/linux-packages-deb-*/*.deb
          artifacts/linux-packages-rpm-*/*.rpm
          artifacts/linux-packages-appimage-*/*.AppImage
          artifacts/windows-package/*.zip
          artifacts/macos-arm64-package/*.dmg
          artifacts/macos-x64-package/*.dmg
        )

        if [ "${{ github.event.inputs.attach_flatpak }}" = "true" ]; then
          files+=(
            artifacts/linux-packages-flatpak-x64-*/*-x86_64.flatpak
            artifacts/linux-packages-flatpak-arm64-*/*-aarch64.flatpak
          )
        fi
        if [ "${{ github.event.inputs.attach_msix }}" = "true" ]; then
          files+=(artifacts/msix-package/CrossMacro-${{ needs.build-core.outputs.package_version_canonical }}-x64.msix)
        fi

        for file in "${files[@]}"; do
          cp "$file" "release-staging/$(basename "$file")"
        done

        find release-staging -maxdepth 1 -type f -print | sort

    - name: Generate and verify SHA256SUMS
      run: |
        bash scripts/ci/generate-checksums.sh \
          --directory release-staging \
          --version "${{ needs.build-core.outputs.package_version_canonical }}" \
          --attach-flatpak "${{ github.event.inputs.attach_flatpak }}" \
          --attach-msix "${{ github.event.inputs.attach_msix }}"

    - name: Verify release artifact manifest
      run: |
        python3 scripts/ci/verify_artifacts.py \
          --directory release-staging \
          --version "${{ needs.build-core.outputs.package_version_canonical }}" \
          --attach-flatpak "${{ github.event.inputs.attach_flatpak }}" \
          --attach-msix "${{ github.event.inputs.attach_msix }}"

    - name: Upload staged release candidate
      uses: actions/upload-artifact@v7
      with:
        name: release-candidate-assets
        path: release-staging/
        retention-days: 30

  # ============================================
  # Stage 4: Publish Release (manual opt-in)
  # ============================================
  create-release:
    name: Create Release
    needs: [build-core, stage-release-assets]
    if: github.event.inputs.publish_release == 'true' && github.event.inputs.publish_existing_release != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Resolve release metadata
      id: release_meta
      run: |
        set -euo pipefail
        VERSION="${{ needs.build-core.outputs.version }}"
        PACKAGE_VERSION="${{ needs.build-core.outputs.package_version_canonical }}"
        TAG="${{ needs.build-core.outputs.source_tag }}"
        DERIVED_PRERELEASE="${{ needs.build-core.outputs.is_prerelease_release }}"
        INPUT_PRERELEASE="${{ github.event.inputs.prerelease }}"

        if [ "$INPUT_PRERELEASE" = "auto" ]; then
          PRERELEASE="$DERIVED_PRERELEASE"
        else
          PRERELEASE="$INPUT_PRERELEASE"
        fi

        if [ "$PRERELEASE" = "true" ]; then
          MAKE_LATEST="false"
          RELEASE_NAME="CrossMacro v${PACKAGE_VERSION} (Pre-release)"
        else
          MAKE_LATEST="true"
          RELEASE_NAME="CrossMacro v${VERSION}"
        fi

        {
          echo "tag=${TAG}"
          echo "prerelease=${PRERELEASE}"
          echo "make_latest=${MAKE_LATEST}"
          echo "release_name=${RELEASE_NAME}"
        } >> "$GITHUB_OUTPUT"

    - name: Download staged release candidate
      uses: actions/download-artifact@v8
      with:
        name: release-candidate-assets
        path: release-staging/

    - name: Upload to Release
      # Pinned from softprops/action-gh-release@v3 on 2026-05-09.
      # Update by checking the current v3 tag, reviewing upstream changes, then replacing this SHA.
      uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
      with:
        name: ${{ steps.release_meta.outputs.release_name }}
        tag_name: ${{ steps.release_meta.outputs.tag }}
        target_commitish: ${{ needs.build-core.outputs.source_tag_sha }}
        draft: ${{ github.event.inputs.draft }}
        prerelease: ${{ steps.release_meta.outputs.prerelease }}
        make_latest: ${{ steps.release_meta.outputs.make_latest }}
        files: release-staging/*
        overwrite_files: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  verify-existing-release:
    name: Verify Existing Release
    needs: build-core
    if: github.event.inputs.publish_existing_release == 'true'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        ref: ${{ needs.build-core.outputs.source_tag }}

    - name: Verify release exists
      env:
        GH_TOKEN: ${{ github.token }}
        SOURCE_TAG: ${{ needs.build-core.outputs.source_tag }}
      run: |
        set -euo pipefail
        gh release view "$SOURCE_TAG" --repo "$GITHUB_REPOSITORY" > /dev/null

    - name: Download existing release assets
      env:
        GH_TOKEN: ${{ github.token }}
        SOURCE_TAG: ${{ needs.build-core.outputs.source_tag }}
      run: |
        set -euo pipefail
        mkdir -p release-existing
        gh release download "$SOURCE_TAG" \
          --repo "$GITHUB_REPOSITORY" \
          --dir release-existing \
          --pattern '*'

    - name: Verify existing release asset manifest
      run: |
        python3 scripts/ci/verify_artifacts.py \
          --directory release-existing \
          --version "${{ needs.build-core.outputs.package_version_canonical }}" \
          --attach-flatpak "${{ github.event.inputs.attach_flatpak }}" \
          --attach-msix "${{ github.event.inputs.attach_msix }}"

  update-aur:
    name: Update AUR
    needs: [build-core, create-release, verify-existing-release]
    if: |
      always() &&
      !cancelled() &&
      needs.build-core.result == 'success' &&
      (needs.create-release.result == 'success' || needs.verify-existing-release.result == 'success') &&
      (github.event.inputs.publish_release == 'true' || github.event.inputs.publish_existing_release == 'true') &&
      github.event.inputs.publish_aur == 'true' &&
      needs.build-core.outputs.is_prerelease_release != 'true'
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
    - name: Install dependencies
      run: |
        pacman -Sy --noconfirm git openssh wget
        
    - name: Checkout code
      uses: actions/checkout@v6
    
    - name: Setup SSH for AUR
      env:
        AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
      run: |
        umask 077
        mkdir -p ~/.ssh
        echo "$AUR_SSH_KEY" > ~/.ssh/id_aur
        chmod 600 ~/.ssh/id_aur

    - name: Add AUR host key
      run: |
        mkdir -p ~/.ssh
        EXPECTED_AUR_ED25519_FINGERPRINT="SHA256:RFzBCUItH9LZS0cKB5UE6ceAYhBD5C8GeOBip8Z11+4"
        ssh-keyscan -t ed25519 aur.archlinux.org > ~/.ssh/known_hosts.raw
        ACTUAL_AUR_ED25519_FINGERPRINT="$(ssh-keygen -lf ~/.ssh/known_hosts.raw | awk '{print $2}')"
        test "$ACTUAL_AUR_ED25519_FINGERPRINT" = "$EXPECTED_AUR_ED25519_FINGERPRINT"
        ssh-keygen -H -f ~/.ssh/known_hosts.raw
        mv ~/.ssh/known_hosts.raw ~/.ssh/known_hosts
        rm -f ~/.ssh/known_hosts.raw.old
        chmod 600 ~/.ssh/known_hosts
        

    
    - name: Test SSH Connection
      run: |
        set +e
        SSH_OUTPUT=$(ssh -i ~/.ssh/id_aur \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            -o HostKeyAlgorithms=ssh-ed25519 \
            -T aur@aur.archlinux.org 2>&1)
        SSH_STATUS=$?
        set -e

        echo "$SSH_OUTPUT"

        # AUR commonly returns exit code 1 even for successful auth when interactive shell is disabled.
        if echo "$SSH_OUTPUT" | grep -q "Welcome to AUR"; then
          echo "AUR SSH authentication verified."
          exit 0
        fi

        exit $SSH_STATUS
    
    - name: Clone AUR repository
      env:
        GIT_SSH_COMMAND: ssh -i ~/.ssh/id_aur -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts -o HostKeyAlgorithms=ssh-ed25519
      run: |
        # Set default branch name to suppress Git 3.0 warning
        git config --global init.defaultBranch master

        # Fail fast on SSH/auth/host-key problems instead of masking with fallback init.
        git clone ssh://aur@aur.archlinux.org/crossmacro.git aur-repo
    
    - name: Prepare Package Files
      run: |
        SOURCE_TAG="${{ needs.build-core.outputs.source_tag }}"
        # shellcheck source=scripts/lib/version.sh
        source scripts/lib/version.sh
        export SOURCE_TAG
        AUR_PKGVER="$(to_aur_pkgver "$(get_canonical_package_version)")"
        
        # Copy PKGBUILD and install files from source if not present or to overwrite
        cp scripts/packaging/arch/PKGBUILD aur-repo/
        cp scripts/packaging/arch/crossmacro.install aur-repo/
        cp scripts/packaging/arch/crossmacro.sysusers aur-repo/
        cp scripts/packaging/arch/crossmacro-modules.conf aur-repo/
        
        cd aur-repo
        
        # Update PKGBUILD version
        sed -i "s/pkgver=.*/pkgver=$AUR_PKGVER/" PKGBUILD
        # Pin source tarball to the exact release/pre-release tag used in this run.
        sed -i -E "s#(https://github.com/alper-han/CrossMacro/archive/)[^\" ]+(\\.tar\\.gz)#\\1${SOURCE_TAG}\\2#" PKGBUILD
        # GitHub tag archives extract into CrossMacro-<tag-without-v>, which differs from normalized AUR pkgver on prereleases.
        AUR_SRC_DIR="${SOURCE_TAG#v}"
        sed -i "s#cd \"CrossMacro-\\${pkgver}\"#cd \"CrossMacro-${AUR_SRC_DIR}\"#g" PKGBUILD
        
        # Calculate and update checksum for source tarball only
        wget "https://github.com/alper-han/CrossMacro/archive/$SOURCE_TAG.tar.gz" -O source.tar.gz
        SHA256=$(sha256sum source.tar.gz | cut -d' ' -f1)
        awk -v sha="$SHA256" '
          /^sha256sums=\(/ {
            print "sha256sums=(\047" sha "\047"
            print "            \047SKIP\047"
            print "            \047SKIP\047)"
            skipping=1
            next
          }
          skipping && /^\)/ {
            skipping=0
            next
          }
          !skipping { print }
        ' PKGBUILD > PKGBUILD.tmp
        mv PKGBUILD.tmp PKGBUILD
        rm source.tar.gz
        
        # Update .SRCINFO
        useradd builduser
        chown -R builduser:builduser .
        su builduser -c "makepkg --printsrcinfo" > .SRCINFO
    
    - name: Commit and push to AUR
      env:
        GIT_SSH_COMMAND: ssh -i ~/.ssh/id_aur -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts -o HostKeyAlgorithms=ssh-ed25519
      run: |
        SOURCE_TAG="${{ needs.build-core.outputs.source_tag }}"
        # shellcheck source=scripts/lib/version.sh
        source scripts/lib/version.sh
        export SOURCE_TAG
        AUR_PKGVER="$(to_aur_pkgver "$(get_canonical_package_version)")"
        cd aur-repo
        
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git config --global init.defaultBranch master
        git config --global --add safe.directory "$(pwd)"
        
        git add PKGBUILD .SRCINFO crossmacro.install crossmacro.sysusers crossmacro-modules.conf
        
        if ! git diff --quiet --cached; then
          git commit -m "Update to version $AUR_PKGVER (source $SOURCE_TAG)"
          git push origin master
        else
          echo "No changes to commit."
        fi
    
    - name: Cleanup
      if: always()
      run: |
        rm -f ~/.ssh/id_aur
        rm -f ~/.ssh/known_hosts
        rm -rf aur-repo

  publish-winget:
    name: Publish to Winget
    needs: [build-core, create-release, verify-existing-release]
    runs-on: ubuntu-latest
    if: |
      always() &&
      !cancelled() &&
      needs.build-core.result == 'success' &&
      (needs.create-release.result == 'success' || needs.verify-existing-release.result == 'success') &&
      (github.event.inputs.publish_release == 'true' || github.event.inputs.publish_existing_release == 'true') &&
      github.event.inputs.publish_winget == 'true' &&
      needs.build-core.outputs.is_prerelease_release != 'true'
    steps:
      - name: Publish to Winget
        # Pinned from alper-han/winget-releaser@main on 2026-05-09.
        # Update by checking the current main branch, reviewing upstream changes, then replacing this SHA.
        uses: alper-han/winget-releaser@19e706d4c9121098010096f9c495a70a7518b30f
        with:
          identifier: AlperHan.CrossMacro
          token: ${{ secrets.WINGET_TOKEN }}
