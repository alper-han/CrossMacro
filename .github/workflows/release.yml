name: Build and Release
run-name: CrossMacro ${{ github.ref_name }}

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Optional override, must match VERSION file (X.Y.Z)'
        required: false
        default: ''
      publish_prerelease:
        description: 'Create a GitHub pre-release from this commit'
        type: boolean
        required: false
        default: false
      publish_aur:
        description: 'Manually update AUR (disabled by default)'
        type: boolean
        required: false
        default: false
      prerelease_tag:
        description: 'Optional pre-release tag (default: vX.Y.Z-pre.<run_number>)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  # ============================================
  # Stage 1: Build Core Binaries (shared by all)
  # ============================================
  build-core:
    name: Build Core Binaries
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_prerelease_release: ${{ steps.version.outputs.is_prerelease_release }}
      source_tag: ${{ steps.version.outputs.source_tag }}
      package_version_canonical: ${{ steps.version.outputs.package_version_canonical }}
      prerelease_label: ${{ steps.version.outputs.prerelease_label }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    
    - name: Extract version
      id: version
      run: |
        REPO_VERSION="$(tr -d '\r\n[:space:]' < VERSION)"
        IS_PRERELEASE_RELEASE="false"
        SOURCE_TAG=""
        ALLOW_PRERELEASE_VERSION_DRIFT="false"
        if ! [[ "$REPO_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "Invalid VERSION file value: '$REPO_VERSION'"
          exit 1
        fi

        if [ "${{ github.event_name }}" == "push" ]; then
          SOURCE_TAG="${GITHUB_REF#refs/tags/}"
          if [[ "$SOURCE_TAG" != v* ]]; then
            echo "Tag '$SOURCE_TAG' must start with 'v'"
            exit 1
          fi
          TAG_VERSION="${SOURCE_TAG#v}"
          BASE_TAG_VERSION="${TAG_VERSION%%[-+]*}"
          if [ "$BASE_TAG_VERSION" != "$REPO_VERSION" ]; then
            echo "Tag version '$TAG_VERSION' does not match VERSION file '$REPO_VERSION' (or X.Y.Z-suffix form)"
            exit 1
          fi
          if [[ "$TAG_VERSION" == *-* ]]; then
            IS_PRERELEASE_RELEASE="true"
          fi
        else
          INPUT_VERSION="${{ github.event.inputs.version }}"
          if [ -n "$INPUT_VERSION" ] && [ "$INPUT_VERSION" != "$REPO_VERSION" ]; then
            echo "workflow_dispatch version '$INPUT_VERSION' does not match VERSION file '$REPO_VERSION'"
            exit 1
          fi
          if [ "${{ github.event.inputs.publish_prerelease }}" = "true" ]; then
            IS_PRERELEASE_RELEASE="true"
            INPUT_TAG="${{ github.event.inputs.prerelease_tag }}"
            if [ -n "$INPUT_TAG" ]; then
              SOURCE_TAG="$INPUT_TAG"
              ALLOW_PRERELEASE_VERSION_DRIFT="true"
              if [[ "$SOURCE_TAG" != v* ]]; then
                SOURCE_TAG="v$SOURCE_TAG"
              fi
            else
              SOURCE_TAG="v${REPO_VERSION}-pre.${{ github.run_number }}"
            fi
          else
            SOURCE_TAG="v$REPO_VERSION"
          fi
        fi

        PACKAGE_VERSION_CANONICAL="${SOURCE_TAG#v}"
        BASE_VERSION="${PACKAGE_VERSION_CANONICAL%%[-+]*}"
        if [ "$BASE_VERSION" != "$REPO_VERSION" ]; then
          if [ "$ALLOW_PRERELEASE_VERSION_DRIFT" = "true" ]; then
            echo "Warning: prerelease tag base '$BASE_VERSION' differs from VERSION '$REPO_VERSION' (allowed for manual prerelease)."
          else
            echo "Resolved source tag '$SOURCE_TAG' does not match VERSION '$REPO_VERSION'"
            exit 1
          fi
        fi

        PRERELEASE_LABEL=""
        if [ "$PACKAGE_VERSION_CANONICAL" != "$BASE_VERSION" ] && [[ "$PACKAGE_VERSION_CANONICAL" == *-* ]]; then
          PRERELEASE_LABEL="${PACKAGE_VERSION_CANONICAL#*-}"
          PRERELEASE_LABEL="${PRERELEASE_LABEL%%+*}"
        fi
        if [ "$IS_PRERELEASE_RELEASE" = "false" ] && [ -n "$PRERELEASE_LABEL" ]; then
          IS_PRERELEASE_RELEASE="true"
        fi

        VERSION="$REPO_VERSION"
        echo "Using version: $VERSION (source_tag=$SOURCE_TAG prerelease=$IS_PRERELEASE_RELEASE)"
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "is_prerelease_release=$IS_PRERELEASE_RELEASE" >> $GITHUB_OUTPUT
        echo "source_tag=$SOURCE_TAG" >> $GITHUB_OUTPUT
        echo "package_version_canonical=$PACKAGE_VERSION_CANONICAL" >> $GITHUB_OUTPUT
        echo "prerelease_label=$PRERELEASE_LABEL" >> $GITHUB_OUTPUT

    - name: Sync versioned manifests
      run: |
        chmod +x scripts/sync-version.sh
        VERSION="${{ steps.version.outputs.version }}" ./scripts/sync-version.sh --check
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'
    
    - name: Build Windows UI binary
      run: |
        dotnet publish src/CrossMacro.UI.Windows/CrossMacro.UI.Windows.csproj \
          -c Release \
          -r win-x64 \
          --self-contained true \
          -p:PublishSingleFile=true \
          -p:PublishTrimmed=true \
          -p:IncludeNativeLibrariesForSelfExtract=true \
          -p:DebugType=None \
          -p:DebugSymbols=false \
          -p:Version=${{ steps.version.outputs.version }} \
          -o publish-windows/
    
    - name: Upload Windows artifacts
      uses: actions/upload-artifact@v7
      with:
        name: windows-binary
        path: publish-windows/
        retention-days: 1

  build-linux-binaries:
    name: Build Linux Binaries (${{ matrix.arch_suffix }})
    needs: build-core
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch_suffix: x64
            target_arch: x86_64
            dotnet_rid: linux-x64
            daemon_publish_args: ""
          - arch_suffix: arm64
            target_arch: aarch64
            dotnet_rid: linux-arm64
            daemon_publish_args: "-p:PublishAot=false --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=true"
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Build Linux UI binary
      run: |
        dotnet publish src/CrossMacro.UI.Linux/CrossMacro.UI.Linux.csproj \
          -c Release \
          -r "${{ matrix.dotnet_rid }}" \
          --self-contained true \
          -p:PublishSingleFile=true \
          -p:PublishTrimmed=true \
          -p:PublishAot=false \
          -p:DebugType=None \
          -p:DebugSymbols=false \
          -p:Version="${{ needs.build-core.outputs.version }}" \
          -o "publish-linux-${{ matrix.arch_suffix }}/"

    - name: Build Linux Daemon
      run: |
        dotnet publish src/CrossMacro.Daemon/CrossMacro.Daemon.csproj \
          -c Release \
          -r "${{ matrix.dotnet_rid }}" \
          ${{ matrix.daemon_publish_args }} \
          -p:Version="${{ needs.build-core.outputs.version }}" \
          -o "publish-daemon-${{ matrix.arch_suffix }}/"

    - name: Upload Linux UI artifacts
      uses: actions/upload-artifact@v7
      with:
        name: linux-binary-${{ matrix.arch_suffix }}
        path: publish-linux-${{ matrix.arch_suffix }}/
        retention-days: 1

    - name: Upload Linux Daemon artifacts
      uses: actions/upload-artifact@v7
      with:
        name: linux-daemon-${{ matrix.arch_suffix }}
        path: publish-daemon-${{ matrix.arch_suffix }}/
        retention-days: 1

  # ============================================
  # Stage 2: Parallel Packaging (all run simultaneously)
  # ============================================
  
  package-deb:
    name: Package DEB (${{ matrix.arch_suffix }})
    needs: [build-core, build-linux-binaries]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch_suffix: x64
            target_arch: x86_64
          - arch_suffix: arm64
            target_arch: aarch64
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    
    - name: Download Linux UI binary
      uses: actions/download-artifact@v8
      with:
        name: linux-binary-${{ matrix.arch_suffix }}
        path: publish/
    
    - name: Download Linux Daemon binary
      uses: actions/download-artifact@v8
      with:
        name: linux-daemon-${{ matrix.arch_suffix }}
        path: publish-daemon/
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y dpkg-dev fakeroot patchelf
    
    - name: Build DEB package
      run: |
        cd scripts
        chmod +x build_deb.sh
        VERSION="${{ needs.build-core.outputs.version }}" SOURCE_TAG="${{ needs.build-core.outputs.source_tag }}" PACKAGE_VERSION_CANONICAL="${{ needs.build-core.outputs.package_version_canonical }}" TARGET_ARCH="${{ matrix.target_arch }}" PUBLISH_DIR="../publish" DAEMON_DIR="../publish-daemon" ./build_deb.sh

    - name: Verify DEB man page
      run: |
        set -euo pipefail
        deb_file="$(ls -1 scripts/*.deb | head -n 1)"
        dpkg-deb -c "$deb_file" | grep -E '/usr/share/man/man1/crossmacro\.1\.gz$'
    
    - name: Upload DEB artifact
      uses: actions/upload-artifact@v7
      with:
        name: deb-package-${{ matrix.arch_suffix }}
        path: |
          scripts/*.deb
        retention-days: 1

  package-rpm:
    name: Package RPM (${{ matrix.arch_suffix }})
    needs: [build-core, build-linux-binaries]
    runs-on: ubuntu-latest
    env:
      FEDORA_X64_IMAGE: fedora:latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch_suffix: x64
            target_arch: x86_64
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    
    - name: Download Linux UI binary
      uses: actions/download-artifact@v8
      with:
        name: linux-binary-${{ matrix.arch_suffix }}
        path: publish/
    
    - name: Download Linux Daemon binary
      uses: actions/download-artifact@v8
      with:
        name: linux-daemon-${{ matrix.arch_suffix }}
        path: publish-daemon/
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y rpm checkpolicy semodule-utils patchelf
    
    - name: Build RPM package
      run: |
        cd scripts
        chmod +x build_rpm.sh
        VERSION="${{ needs.build-core.outputs.version }}" SOURCE_TAG="${{ needs.build-core.outputs.source_tag }}" PACKAGE_VERSION_CANONICAL="${{ needs.build-core.outputs.package_version_canonical }}" TARGET_ARCH="${{ matrix.target_arch }}" RPM_ARCH="${{ matrix.target_arch }}" PUBLISH_DIR="../publish" DAEMON_DIR="../publish-daemon" ./build_rpm.sh

    - name: Verify RPM man page
      run: |
        set -euo pipefail
        rpm_file="$(ls -1 scripts/*.rpm | head -n 1)"
        rpm -qpl "$rpm_file" | grep -E '^/usr/share/man/man1/crossmacro\.1(\.gz)?$'

    - name: CLI Smoke (RPM x64)
      run: |
        set -euo pipefail
        rpm_file="$(find scripts -maxdepth 1 -type f -name '*.rpm' ! -name '*aarch64*.rpm' | head -n 1)"
        if [ -z "$rpm_file" ]; then
          echo "No x64 RPM artifact found in scripts/."
          exit 1
        fi
        rpm_file_name="$(basename "$rpm_file")"
        docker run --rm --platform linux/amd64 \
          -v "$PWD/scripts":/artifacts:ro \
          -e RPM_FILE_NAME="$rpm_file_name" \
          "$FEDORA_X64_IMAGE" \
          bash -lc '
            set -euo pipefail
            dnf -y install polkit libXtst libX11 libXcursor libXrandr fontconfig >/dev/null
            dnf -y install "/artifacts/${RPM_FILE_NAME}" >/dev/null

            set +e
            help_output="$(/usr/bin/crossmacro --help 2>&1)"
            help_code=$?
            set -e
            echo "$help_output"
            test "$help_code" -eq 0
            echo "$help_output" | grep -F "Usage:"

            set +e
            settings_output="$(/usr/bin/crossmacro settings get --json 2>&1)"
            settings_code=$?
            set -e
            echo "$settings_output"
            test "$settings_code" -eq 0
            echo "$settings_output" | grep -F "\"status\": \"ok\""
            echo "$settings_output" | grep -F "\"code\": 0"

            set +e
            dry_run_output="$(/usr/bin/crossmacro run --step "move abs 10 10" --step "click left" --dry-run --json 2>&1)"
            dry_run_code=$?
            set -e
            echo "$dry_run_output"
            test "$dry_run_code" -eq 0
            echo "$dry_run_output" | grep -F "\"status\": \"ok\""
            echo "$dry_run_output" | grep -F "\"code\": 0"
            echo "$dry_run_output" | grep -F "\"coordinateMode\": \"absolute\""
          '
    
    - name: Upload RPM artifact
      uses: actions/upload-artifact@v7
      with:
        name: rpm-package-${{ matrix.arch_suffix }}
        path: |
          scripts/*.rpm
        retention-days: 1

  package-rpm-arm64:
    name: Package RPM (arm64)
    needs: [build-core, build-linux-binaries]
    runs-on: ubuntu-24.04-arm
    env:
      FEDORA_ARM64_IMAGE: fedora:latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Download Linux UI binary (arm64)
      uses: actions/download-artifact@v8
      with:
        name: linux-binary-arm64
        path: publish/

    - name: Download Linux Daemon binary (arm64)
      uses: actions/download-artifact@v8
      with:
        name: linux-daemon-arm64
        path: publish-daemon/

    - name: Build RPM package (arm64 in container)
      run: |
        docker run --rm --platform linux/arm64 \
          -v "$PWD":/work \
          -w /work/scripts \
          "$FEDORA_ARM64_IMAGE" \
          bash -lc '
            set -euo pipefail
            dnf -y install rpm-build checkpolicy policycoreutils patchelf file >/dev/null
            VERSION="${{ needs.build-core.outputs.version }}" SOURCE_TAG="${{ needs.build-core.outputs.source_tag }}" PACKAGE_VERSION_CANONICAL="${{ needs.build-core.outputs.package_version_canonical }}" TARGET_ARCH=aarch64 RPM_ARCH=aarch64 \
              PUBLISH_DIR=/work/publish \
              DAEMON_DIR=/work/publish-daemon \
              ./build_rpm.sh
          '

    - name: Verify RPM man page (arm64)
      run: |
        set -euo pipefail
        rpm_file="$(find scripts -maxdepth 1 -type f -name '*aarch64*.rpm' | head -n 1)"
        if [ -z "$rpm_file" ]; then
          echo "No arm64 RPM artifact found in scripts/."
          exit 1
        fi
        rpm_file_name="$(basename "$rpm_file")"
        docker run --rm --platform linux/arm64 \
          -v "$PWD/scripts":/artifacts:ro \
          -e RPM_FILE_NAME="$rpm_file_name" \
          "$FEDORA_ARM64_IMAGE" \
          bash -lc '
            set -euo pipefail
            dnf -y install rpm >/dev/null
            rpm -qpl "/artifacts/${RPM_FILE_NAME}" | grep -E "^/usr/share/man/man1/crossmacro\.1(\.gz)?$"
          '

    - name: CLI Smoke (RPM arm64)
      run: |
        set -euo pipefail
        rpm_file="$(find scripts -maxdepth 1 -type f -name '*aarch64*.rpm' | head -n 1)"
        if [ -z "$rpm_file" ]; then
          echo "No arm64 RPM artifact found in scripts/."
          exit 1
        fi
        rpm_file_name="$(basename "$rpm_file")"
        docker run --rm --platform linux/arm64 \
          -v "$PWD/scripts":/artifacts:ro \
          -e RPM_FILE_NAME="$rpm_file_name" \
          "$FEDORA_ARM64_IMAGE" \
          bash -lc '
            set -euo pipefail
            dnf -y install polkit libXtst libX11 libXcursor libXrandr fontconfig >/dev/null
            dnf -y install "/artifacts/${RPM_FILE_NAME}" >/dev/null

            set +e
            help_output="$(/usr/bin/crossmacro --help 2>&1)"
            help_code=$?
            set -e
            echo "$help_output"
            test "$help_code" -eq 0
            echo "$help_output" | grep -F "Usage:"

            set +e
            settings_output="$(/usr/bin/crossmacro settings get --json 2>&1)"
            settings_code=$?
            set -e
            echo "$settings_output"
            test "$settings_code" -eq 0
            echo "$settings_output" | grep -F "\"status\": \"ok\""
            echo "$settings_output" | grep -F "\"code\": 0"

            set +e
            dry_run_output="$(/usr/bin/crossmacro run --step "move abs 10 10" --step "click left" --dry-run --json 2>&1)"
            dry_run_code=$?
            set -e
            echo "$dry_run_output"
            test "$dry_run_code" -eq 0
            echo "$dry_run_output" | grep -F "\"status\": \"ok\""
            echo "$dry_run_output" | grep -F "\"code\": 0"
            echo "$dry_run_output" | grep -F "\"coordinateMode\": \"absolute\""
          '

    - name: Upload RPM artifact (arm64)
      uses: actions/upload-artifact@v7
      with:
        name: rpm-package-arm64
        path: |
          scripts/*aarch64*.rpm
        retention-days: 1

  package-appimage:
    name: Package AppImage (${{ matrix.arch_suffix }})
    needs: [build-core, build-linux-binaries]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch_suffix: x64
            target_arch: x86_64
            appimage_arch: x86_64
            appimagetool_host_arch: x86_64
            appimagetool_sha256: ed4ce84f0d9caff66f50bcca6ff6f35aae54ce8135408b3fa33abfc3cb384eb0
            runner: ubuntu-latest
          - arch_suffix: arm64
            target_arch: aarch64
            appimage_arch: aarch64
            appimagetool_host_arch: aarch64
            appimagetool_sha256: f0837e7448a0c1e4e650a93bb3e85802546e60654ef287576f46c71c126a9158
            runner: ubuntu-24.04-arm
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    
    - name: Download Linux binary
      uses: actions/download-artifact@v8
      with:
        name: linux-binary-${{ matrix.arch_suffix }}
        path: publish/
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y file desktop-file-utils patchelf jq pkg-config libxtst6
    
    - name: Build AppImage
      run: |
        cd scripts
        chmod +x build_appimage.sh
        VERSION="${{ needs.build-core.outputs.version }}" SOURCE_TAG="${{ needs.build-core.outputs.source_tag }}" PACKAGE_VERSION_CANONICAL="${{ needs.build-core.outputs.package_version_canonical }}" TARGET_ARCH="${{ matrix.target_arch }}" APPIMAGE_ARCH="${{ matrix.appimage_arch }}" APPIMAGETOOL_HOST_ARCH="${{ matrix.appimagetool_host_arch }}" APPIMAGETOOL_SHA256="${{ matrix.appimagetool_sha256 }}" PUBLISH_DIR="../publish" APPIMAGE_EXTRACT_AND_RUN=1 ./build_appimage.sh
    
    - name: Upload AppImage artifact
      uses: actions/upload-artifact@v7
      with:
        name: appimage-package-${{ matrix.arch_suffix }}
        path: |
          scripts/*-${{ matrix.appimage_arch }}.AppImage
        retention-days: 1

  package-flatpak:
    name: Package Flatpak (${{ matrix.arch_suffix }})
    needs: [build-core, build-linux-binaries]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch_suffix: x64
            target_arch: x86_64
            flatpak_arch: x86_64
            runner: ubuntu-latest
          - arch_suffix: arm64
            target_arch: aarch64
            flatpak_arch: aarch64
            runner: ubuntu-24.04-arm
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    
    - name: Download Linux binary
      uses: actions/download-artifact@v8
      with:
        name: linux-binary-${{ matrix.arch_suffix }}
        path: publish/
    
    - name: Install Flatpak tools
      run: |
        sudo apt-get update
        sudo apt-get install -y flatpak flatpak-builder
        flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
        flatpak install --user -y flathub org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08
    
    - name: Build Flatpak
      run: |
        cd scripts
        chmod +x build_flatpak.sh
        VERSION="${{ needs.build-core.outputs.version }}" SOURCE_TAG="${{ needs.build-core.outputs.source_tag }}" PACKAGE_VERSION_CANONICAL="${{ needs.build-core.outputs.package_version_canonical }}" TARGET_ARCH="${{ matrix.target_arch }}" FLATPAK_ARCH="${{ matrix.flatpak_arch }}" PUBLISH_DIR="../publish" ./build_flatpak.sh
    
    - name: Upload Flatpak artifact
      uses: actions/upload-artifact@v7
      with:
        name: flatpak-package-${{ matrix.arch_suffix }}
        path: |
          flatpak/*-${{ matrix.flatpak_arch }}.flatpak
        retention-days: 1

  package-windows:
    name: Package Windows
    needs: build-core
    runs-on: ubuntu-latest
    steps:
    - name: Download Windows binary
      uses: actions/download-artifact@v8
      with:
        name: windows-binary
        path: publish-windows/

    - name: Rename executable
      run: |
        mv publish-windows/CrossMacro.UI.exe publish-windows/CrossMacro-${{ needs.build-core.outputs.package_version_canonical }}-win-x64.exe

    - name: Upload Windows artifact
      uses: actions/upload-artifact@v7
      with:
        name: windows-package
        path: |
          publish-windows/*.exe
        retention-days: 1

  package-msix:
    name: Package MSIX (Store)
    needs: build-core
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Build Windows binary for MSIX
      shell: pwsh
      run: |
        dotnet publish src/CrossMacro.UI.Windows/CrossMacro.UI.Windows.csproj `
          -c Release `
          -r win-x64 `
          --self-contained true `
          -p:PublishSingleFile=false `
          -p:PublishTrimmed=false `
          -p:PublishReadyToRun=true `
          -p:DebugType=None `
          -p:DebugSymbols=false `
          -p:Version=${{ needs.build-core.outputs.version }} `
          -o msix-content/

    - name: Prepare MSIX content
      shell: pwsh
      run: |
        ./scripts/msix/prepare-msix.ps1 -Version "${{ needs.build-core.outputs.version }}" -OutputDir "msix-content"

    - name: Create MSIX package
      shell: pwsh
      run: |
        $sdkPath = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\10.*\x64\makeappx.exe" |
                   Sort-Object -Descending | Select-Object -First 1
        & $sdkPath pack /d msix-content /p CrossMacro-${{ needs.build-core.outputs.package_version_canonical }}.msix /nv

    - name: Upload MSIX artifact
      uses: actions/upload-artifact@v7
      with:
        name: msix-package
        path: "*.msix"
        retention-days: 1

  # macOS builds run on macOS runner (can't cross-compile from Linux)
  build-macos-arm64:
    name: Build macOS (ARM64)
    needs: build-core
    runs-on: macos-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'
    
    - name: Install create-dmg
      run: |
        brew install create-dmg
    
    - name: Build and Package DMG
      run: |
        chmod +x scripts/build_macos.sh
        ./scripts/build_macos.sh
      env:
        RID: osx-arm64
        VERSION: ${{ needs.build-core.outputs.version }}
        SOURCE_TAG: ${{ needs.build-core.outputs.source_tag }}
        PACKAGE_VERSION_CANONICAL: ${{ needs.build-core.outputs.package_version_canonical }}
    
    - name: Upload macOS ARM64 DMG
      uses: actions/upload-artifact@v7
      with:
        name: macos-arm64-package
        path: scripts/macos_output/*.dmg
        retention-days: 1

  build-macos-x64:
    name: Build macOS (x64)
    needs: build-core
    runs-on: macos-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'
    
    - name: Install create-dmg
      run: |
        brew install create-dmg
    
    - name: Build and Package DMG
      run: |
        chmod +x scripts/build_macos.sh
        ./scripts/build_macos.sh
      env:
        RID: osx-x64
        VERSION: ${{ needs.build-core.outputs.version }}
        SOURCE_TAG: ${{ needs.build-core.outputs.source_tag }}
        PACKAGE_VERSION_CANONICAL: ${{ needs.build-core.outputs.package_version_canonical }}
    
    - name: Upload macOS x64 DMG
      uses: actions/upload-artifact@v7
      with:
        name: macos-x64-package
        path: scripts/macos_output/*.dmg
        retention-days: 1

  update-aur:
    name: Update AUR
    needs: [create-release, build-core]
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && needs.build-core.outputs.is_prerelease_release != 'true') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_prerelease == 'true' && github.event.inputs.publish_aur == 'true')
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
    - name: Install dependencies
      run: |
        pacman -Sy --noconfirm git openssh wget
        
    - name: Checkout code
      uses: actions/checkout@v6
    
    - name: Setup SSH for AUR
      env:
        AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
      run: |
        umask 077
        mkdir -p ~/.ssh
        echo "$AUR_SSH_KEY" > ~/.ssh/id_aur
        chmod 600 ~/.ssh/id_aur

    - name: Add AUR host key
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -H -t ed25519 aur.archlinux.org > ~/.ssh/known_hosts
        grep -q "ssh-ed25519" ~/.ssh/known_hosts
        chmod 600 ~/.ssh/known_hosts
        

    
    - name: Test SSH Connection
      run: |
        set +e
        SSH_OUTPUT=$(ssh -i ~/.ssh/id_aur \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile=$HOME/.ssh/known_hosts \
            -o HostKeyAlgorithms=ssh-ed25519 \
            -T aur@aur.archlinux.org 2>&1)
        SSH_STATUS=$?
        set -e

        echo "$SSH_OUTPUT"

        # AUR commonly returns exit code 1 even for successful auth when interactive shell is disabled.
        if echo "$SSH_OUTPUT" | grep -q "Welcome to AUR"; then
          echo "AUR SSH authentication verified."
          exit 0
        fi

        exit $SSH_STATUS
    
    - name: Clone AUR repository
      env:
        GIT_SSH_COMMAND: ssh -i ~/.ssh/id_aur -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts -o HostKeyAlgorithms=ssh-ed25519
      run: |
        # Set default branch name to suppress Git 3.0 warning
        git config --global init.defaultBranch master

        # Fail fast on SSH/auth/host-key problems instead of masking with fallback init.
        git clone ssh://aur@aur.archlinux.org/crossmacro.git aur-repo
    
    - name: Prepare Package Files
      run: |
        SOURCE_TAG="${{ needs.build-core.outputs.source_tag }}"
        # shellcheck source=scripts/lib/version.sh
        source scripts/lib/version.sh
        export SOURCE_TAG
        AUR_PKGVER="$(to_aur_pkgver)"
        
        # Copy PKGBUILD and install files from source if not present or to overwrite
        cp scripts/packaging/arch/PKGBUILD aur-repo/
        cp scripts/packaging/arch/crossmacro.install aur-repo/
        cp scripts/packaging/arch/crossmacro.sysusers aur-repo/
        cp scripts/packaging/arch/crossmacro-modules.conf aur-repo/
        
        cd aur-repo
        
        # Update PKGBUILD version
        sed -i "s/pkgver=.*/pkgver=$AUR_PKGVER/" PKGBUILD
        # Pin source tarball to the exact release/pre-release tag used in this run.
        sed -i -E "s#(https://github.com/alper-han/CrossMacro/archive/)[^\" ]+(\\.tar\\.gz)#\\1${SOURCE_TAG}\\2#" PKGBUILD
        # GitHub tag archives extract into CrossMacro-<tag-without-v>, which differs from normalized AUR pkgver on prereleases.
        AUR_SRC_DIR="${SOURCE_TAG#v}"
        sed -i "s#cd \\\"CrossMacro-\\\${pkgver}\\\"#cd \\\"CrossMacro-${AUR_SRC_DIR}\\\"#g" PKGBUILD
        
        # Calculate and update checksum for source tarball only
        wget "https://github.com/alper-han/CrossMacro/archive/$SOURCE_TAG.tar.gz" -O source.tar.gz
        SHA256=$(sha256sum source.tar.gz | cut -d' ' -f1)
        sed -i "/^sha256sums=/,/)$/c\\sha256sums=('$SHA256'\n            'SKIP'\n            'SKIP')  # sysusers and modules config checksums (local files)" PKGBUILD
        rm source.tar.gz
        
        # Update .SRCINFO
        useradd builduser
        chown -R builduser:builduser .
        su builduser -c "makepkg --printsrcinfo" > .SRCINFO
    
    - name: Commit and push to AUR
      env:
        GIT_SSH_COMMAND: ssh -i ~/.ssh/id_aur -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts -o HostKeyAlgorithms=ssh-ed25519
      run: |
        SOURCE_TAG="${{ needs.build-core.outputs.source_tag }}"
        # shellcheck source=scripts/lib/version.sh
        source scripts/lib/version.sh
        export SOURCE_TAG
        AUR_PKGVER="$(to_aur_pkgver)"
        cd aur-repo
        
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git config --global init.defaultBranch master
        git config --global --add safe.directory $(pwd)
        
        git add PKGBUILD .SRCINFO crossmacro.install crossmacro.sysusers crossmacro-modules.conf
        
        if ! git diff --quiet --cached; then
          git commit -m "Update to version $AUR_PKGVER (source $SOURCE_TAG)"
          git push origin master
        else
          echo "No changes to commit."
        fi
    
    - name: Cleanup
      if: always()
      run: |
        rm -f ~/.ssh/id_aur
        rm -f ~/.ssh/known_hosts
        rm -rf aur-repo

  # ============================================
  # Stage 3: Create Release (after all packages ready)
  # ============================================
  create-release:
    name: Create Release
    needs: [build-core, package-deb, package-rpm, package-rpm-arm64, package-appimage, package-flatpak, package-windows, build-macos-arm64, build-macos-x64]
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_prerelease == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Resolve release metadata
      id: release_meta
      run: |
        VERSION="${{ needs.build-core.outputs.version }}"
        PACKAGE_VERSION="${{ needs.build-core.outputs.package_version_canonical }}"
        TAG="${{ needs.build-core.outputs.source_tag }}"
        IS_PRERELEASE="${{ needs.build-core.outputs.is_prerelease_release }}"

        if [ "$IS_PRERELEASE" = "true" ]; then
          PRERELEASE="true"
          MAKE_LATEST="false"
          RELEASE_NAME="CrossMacro v${PACKAGE_VERSION} (Pre-release)"
        else
          PRERELEASE="false"
          MAKE_LATEST="true"
          RELEASE_NAME="CrossMacro v${VERSION}"
        fi

        echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
        echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"
        echo "make_latest=${MAKE_LATEST}" >> "$GITHUB_OUTPUT"
        echo "release_name=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"

    - name: Download all artifacts
      uses: actions/download-artifact@v8
      with:
        path: artifacts/
    
    - name: Generate checksums
      run: |
        cd artifacts
        sha256sum deb-package-*/*.deb > crossmacro-deb.sha256
        sha256sum rpm-package-*/*.rpm > crossmacro-rpm.sha256
        sha256sum appimage-package-*/*.AppImage > crossmacro-appimage.sha256
        sha256sum flatpak-package-*/*.flatpak > crossmacro-flatpak.sha256
        sha256sum windows-package/*.exe > crossmacro-windows.sha256
        sha256sum macos-arm64-package/*.dmg > crossmacro-macos-arm64.sha256
        sha256sum macos-x64-package/*.dmg > crossmacro-macos-x64.sha256
    
    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        name: ${{ steps.release_meta.outputs.release_name }}
        tag_name: ${{ steps.release_meta.outputs.tag }}
        target_commitish: ${{ github.sha }}
        draft: false
        prerelease: ${{ steps.release_meta.outputs.prerelease }}
        make_latest: ${{ steps.release_meta.outputs.make_latest }}
        files: |
          artifacts/deb-package-*/*.deb
          artifacts/crossmacro-deb.sha256
          artifacts/rpm-package-*/*.rpm
          artifacts/crossmacro-rpm.sha256
          artifacts/appimage-package-*/*.AppImage
          artifacts/crossmacro-appimage.sha256
          artifacts/flatpak-package-*/*.flatpak
          artifacts/crossmacro-flatpak.sha256
          artifacts/windows-package/*.exe
          artifacts/crossmacro-windows.sha256
          artifacts/macos-arm64-package/*.dmg
          artifacts/crossmacro-macos-arm64.sha256
          artifacts/macos-x64-package/*.dmg
          artifacts/crossmacro-macos-x64.sha256
        overwrite_files: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-winget:
    name: Publish to Winget
    needs: [create-release, build-core]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && needs.build-core.outputs.is_prerelease_release != 'true'
    steps:
      - name: Publish to Winget
        uses: alper-han/winget-releaser@main
        with:
          identifier: AlperHan.CrossMacro
          token: ${{ secrets.WINGET_TOKEN }}
